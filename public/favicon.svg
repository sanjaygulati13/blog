<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="SG galaxy orbit favicon">
  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="230"/>
    </clipPath>
  </defs>

  <!-- transparent canvas, circular icon -->
  <circle cx="256" cy="256" r="230" fill="#061A33"/>

  <g clip-path="url(#circleClip)">
    <!-- subtle inner depth, still flat-looking -->
    <circle cx="256" cy="256" r="210" fill="#082044" opacity="0.55"/>

    <!-- orbit rings -->
    <ellipse cx="256" cy="256" rx="178" ry="150" transform="rotate(-22 256 256)"
             fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"
             stroke-dasharray="290 165" stroke-dashoffset="22"/>
    <ellipse cx="256" cy="256" rx="176" ry="148" transform="rotate(-22 256 256)"
             fill="none" stroke="#2EA8FF" stroke-width="12" stroke-linecap="round"
             stroke-dasharray="130 345" stroke-dashoffset="-170"/>

    <!-- SG monogram -->
    <text x="214" y="298" text-anchor="middle"
          font-family="Inter, Arial, Helvetica, sans-serif" font-size="142" font-weight="800"
          fill="#FFFFFF" letter-spacing="-10">S</text>
    <text x="304" y="305" text-anchor="middle"
          font-family="Inter, Arial, Helvetica, sans-serif" font-size="132" font-weight="800"
          fill="#2EA8FF" letter-spacing="-12">G</text>

    <!-- orbit dot -->
    <circle cx="370" cy="167" r="28" fill="#2EA8FF"/>

    <!-- simple star accent -->
    <path d="M121 344 L132 372 L160 383 L132 394 L121 422 L110 394 L82 383 L110 372 Z" fill="#FFFFFF"/>
  </g>
</svg>
